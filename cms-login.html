<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Acceso CMS · A la fresca</title>
  <link rel="stylesheet" href="styles.css?v=20260630-018">
</head>
<body class="cms-body">
  <main class="cms-login-shell">
    <form class="cms-login-card" method="post" action="/cms-login">
      <p class="eyebrow">Acceso CMS</p>
      <h1>Entrar al gestor</h1>
      <p class="login-error">Los datos no son correctos. Revisa el usuario y la contraseña.</p>
      <label>Email <input type="email" name="email" autocomplete="username" required></label>
      <label>Contraseña <input type="password" name="password" autocomplete="current-password" required></label>
      <button class="button button-dark" type="submit">Entrar</button>
      <a class="text-link" href="index.html">Volver a la web</a>
    </form>
  </main>
  <script>
    if (new URLSearchParams(window.location.search).get("error")) {
      document.body.classList.add("login-has-error");
    }
  </script>
</body>
</html>
